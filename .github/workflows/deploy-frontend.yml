name: Deploy Frontend to S3 and CloudFront

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          GENERATE_SOURCEMAP: false
          REACT_APP_API_URL: https://wodbuster-ai.online/api

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync to S3
        working-directory: frontend
        run: |
          aws s3 sync build/ s3://${{ secrets.S3_BUCKET }} --delete

      - name: Configure CloudFront Error Pages for SPA
        continue-on-error: true
        run: |
          echo "Configuring CloudFront error pages for React Router..."
          
          # Get current distribution config
          ETAG=$(aws cloudfront get-distribution-config \
            --id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --query 'ETag' \
            --output text)
          
          aws cloudfront get-distribution-config \
            --id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --query 'DistributionConfig' > dist-config.json
          
          # Update error pages configuration
          cat dist-config.json | jq '.CustomErrorResponses.Items = [
            {
              "ErrorCode": 403,
              "ResponsePagePath": "/index.html",
              "ResponseCode": "200",
              "ErrorCachingMinTTL": 300
            },
            {
              "ErrorCode": 404,
              "ResponsePagePath": "/index.html",
              "ResponseCode": "200",
              "ErrorCachingMinTTL": 300
            }
          ] | .CustomErrorResponses.Quantity = 2' > dist-config-updated.json
          
          # Update distribution
          aws cloudfront update-distribution \
            --id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --distribution-config file://dist-config-updated.json \
            --if-match "$ETAG"
          
          echo "✅ CloudFront error pages configured for SPA routing"

      - name: Invalidate CloudFront cache
        continue-on-error: true
        run: |
          echo "Distribution ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}"
          echo "Attempting to invalidate CloudFront cache..."
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
          echo "✅ CloudFront cache invalidated"

      - name: Deployment complete
        run: |
          echo "✅ Frontend deployed successfully to https://wodbuster-ai.online"
          echo "📦 Files uploaded to S3 bucket: ${{ secrets.S3_BUCKET }}"
          echo "💡 If CloudFront invalidation failed, cache will update automatically in ~24h or invalidate manually"
